version: "3"

services:
  app:
    build: .
    volumes:
      - app:/home/app
      - "~/.ssh:/home/app/.ssh"
      - "~/.aws:/home/app/.aws"
      - "~/.gitconfig:/home/app/.gitconfig"
      - "~/.gitignore:/home/app/.gitignore"
      - ".:/app"
    working_dir: /app
    environment:
      ERL_AFLAGS: "-kernel shell_history enabled"
      APP_NAME: auth0_ex
      VERSION: 0.0.0-dev
      MIX_BUILD_ROOT: /home/app/_build
      MIX_DEPS_PATH: /home/app/deps
    tty: true
    stdin_open: true
    depends_on:
      - redis
      - aws
      - localauth0

  redis:
    image: docker.io/redis:5.0
    ports:
      - "6379:6379"
    hostname: "redis"

  localauth0:
    image: public.ecr.aws/c6i9l4r6/localauth0:0.6.2
    ports:
      - 3000:3000
    environment:
      LOCALAUTH0_CONFIG_PATH: /localauth0.toml
    volumes:
      - ./localauth0.toml:/localauth0.toml:ro

  aws:
    image: motoserver/moto:5.1.21
    environment:
      # Set up moto in a way that matches localstack
      MOTO_PORT: 4566
      MOTO_ACCOUNT_ID: "000000000000"

    ports:
      - "4566:4566"

volumes:
  app:
